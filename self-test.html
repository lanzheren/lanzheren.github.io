<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>三观镜 · 处境分析工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F8F6F1;
      font-family: 'Inter', '思源黑体', 'Source Han Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #2D2A24;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
      transition: background-color 0.2s ease;
      margin: 0;
    }

    .mirror-container {
      width: 100%;
      max-width: 640px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid #E5E2DA;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: all 0.3s ease;
    }

    .mirror-frame {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border-radius: 20px;
      pointer-events: none;
      border: 1px solid rgba(196, 168, 130, 0.15);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5), 0 0 0 1px rgba(229, 226, 218, 0.4);
    }

    .brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .brand h1 {
      font-family: '思源宋体', 'Source Han Serif SC', 'Times New Roman', Georgia, serif;
      font-weight: 400;
      font-size: 2.4rem;
      letter-spacing: 6px;
      color: #2D2A24;
      margin-bottom: 0;
      line-height: 1.2;
    }
    .brand .subtitle {
      color: #7A756E;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #E5E2DA;
      margin: 8px 0;
    }

    .version-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 8px 0;
    }
    .version-option {
      background: #FFFFFF;
      border: 1px solid #E5E2DA;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #FDFCF9;
    }
    .version-option.active {
      border-color: #C4A882;
      background: #F8F6F1;
      box-shadow: 0 4px 12px rgba(139, 115, 85, 0.08);
    }
    .radio-custom {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #C4A882;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      transition: 0.2s;
    }
    .active .radio-custom {
      background: #C4A882;
      border-color: #C4A882;
    }
    .radio-custom::after {
      content: "";
      display: block;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      opacity: 0;
    }
    .active .radio-custom::after {
      opacity: 1;
    }
    .version-text strong {
      font-size: 1.1rem;
      font-weight: 500;
      color: #2D2A24;
      display: block;
    }
    .version-text span {
      font-size: 0.85rem;
      color: #7A756E;
    }

    .btn-primary {
      background: #2D2A24;
      color: #FFFFFF;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: fit-content;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2D2A24;
      border: 1px solid #2D2A24;
    }
    .btn-primary:hover {
      background: #1e1b18;
    }
    .btn-secondary {
      background: transparent;
      color: #2D2A24;
      border: 1px solid #C4A882;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(196,168,130,0.08);
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-note {
      color: #7A756E;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .progress-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 4px;
      background: #E5E2DA;
      border-radius: 4px;
      flex: 1;
    }
    .progress-fill {
      width: 0%;
      height: 4px;
      background: #C4A882;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .question-text {
      font-size: 1.35rem;
      font-weight: 400;
      line-height: 1.4;
      margin: 20px 0 16px;
      color: #2D2A24;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option-item {
      background: white;
      border: 1px solid #E5E2DA;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.2s;
      color: #2D2A24;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-item.selected {
      border-color: #8B7355;
      background: #F8F6F1;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
    }
    .input-box {
      width: 100%;
      padding: 14px;
      border: 1px solid #E5E2DA;
      border-radius: 12px;
      font-size: 1rem;
      background: white;
      color: #2D2A24;
      outline: none;
    }
    .input-box:focus {
      border-color: #C4A882;
    }

    .result-type {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 8px;
      text-align: center;
      color: #2D2A24;
      margin: 16px 0 8px;
      font-family: '思源宋体', serif;
    }
    .dimension-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0;
    }
    .dim-label {
      width: 70px;
      font-weight: 500;
    }
    .dim-bar-bg {
      flex: 1;
      height: 8px;
      background: #E5E2DA;
      border-radius: 8px;
      margin: 0 12px;
    }
    .dim-bar-fill {
      height: 8px;
      border-radius: 8px;
      background: #C4A882;
      width: 0%;
    }
    .mirror-note {
      background: #F8F6F1;
      padding: 16px;
      border-radius: 12px;
      border-left: 3px solid #C4A882;
      font-style: italic;
      color: #5f5a54;
    }
    .fiction-excerpt {
      font-family: '思源宋体', serif;
      color: #4a4640;
      border-top: 1px solid #E5E2DA;
      padding-top: 16px;
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .mirror-container {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
<div class="mirror-container" id="appContainer">
  <div class="mirror-frame"></div>

  <!-- 首页视图 -->
  <div id="landingView">
    <div class="brand">
      <h1>三 观 镜</h1>
      <div class="subtitle">这不是占卜。这是镜子。</div>
    </div>
    <div class="divider"></div>

    <div class="version-selector">
      <div id="versionSimple" class="version-option active" onclick="selectVersion('simple')">
        <div class="radio-custom"></div>
        <div class="version-text">
          <strong>精简版 · 5分钟</strong>
          <span>7道选择题，快速定位</span>
        </div>
      </div>
      <div id="versionDeep" class="version-option" onclick="selectVersion('deep')">
        <div class="radio-custom"></div>
        <div class="version-text">
          <strong>深度版 · 15分钟</strong>
          <span>7题+4开放题，深入反思</span>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="startBtn" onclick="startTest()">
      <span>开始照镜子 →</span>
    </button>
    <div class="footer-note">
      困局不是你的错。<br>但继续困下去，是你的事。
    </div>
    <div class="footer-note" style="margin-top:12px; opacity:0.7;">
      源自小说《困局》· 懒哲人破困体系
    </div>
  </div>

  <!-- 测试视图 -->
  <div id="testView" class="hidden">
    <div style="display: flex; justify-content: space-between; color: #7A756E;">
      <span>三观镜</span>
      <span id="questionCounter">第 1 / 7 题</span>
    </div>
    <div class="progress-section">
      <div class="progress-bar-bg"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="questionText" class="question-text"></div>
    <div id="optionsContainer" class="options-list"></div>
    <div id="openInputContainer" class="hidden" style="margin-top:12px;">
      <input type="text" id="openInputField" class="input-box" placeholder="输入你的回答..." maxlength="20">
    </div>
    <div class="nav-buttons">
      <button class="btn-secondary" id="prevBtn" onclick="prevQuestion()">← 上一步</button>
      <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">下一步 →</button>
    </div>
  </div>

  <!-- 结果视图 -->
  <div id="resultView" class="hidden">
    <div class="brand">
      <h1 style="font-size:1.8rem;">三观镜 · 处境分析</h1>
      <div class="subtitle">“这不是占卜。这是镜子。”</div>
    </div>
    <div class="result-type" id="resultTypeName">破土期</div>
    <div id="dimensionsDisplay" style="margin:16px 0;"></div>
    <div id="interpretationText" style="color:#2D2A24; margin:16px 0;"></div>
    <div class="mirror-note" id="mirrorNote"></div>
    <div class="fiction-excerpt" id="fictionExcerpt"></div>
    <div class="btn-group" style="margin-top:20px;">
      <button class="btn-secondary" onclick="saveResult()">保存结果</button>
      <button class="btn-secondary" onclick="shareResult()">分享</button>
      <button class="btn-primary" onclick="restartTest()">重测</button>
    </div>
    <div class="footer-note">源自小说《困局》· 懒哲人破困体系</div>
  </div>
</div>

<script>
(function() {
  // --- 状态管理 ---
  const state = {
    version: 'simple',
    currentStep: 0,
    answers: [],
    totalQuestions: 7,
  };

  // 精简版7道题定义
  const questionsSimple = [
    { id:1, text:"你觉得自己最近三年，整体是在往上走、原地踏步、还是往下滑？", options:["往上走","原地踏步","往下滑","在换方向"] },
    { id:2, text:"你现在做的事情，有多少是你真正想做的？", options:["全部或大部分","一半左右","很少","几乎没有","我不知道我想做什么"] },
    { id:3, text:"如果你明天失去现在的工作（或主要收入来源），你还有什么？", options:["充足存款（可支撑1年+）","够撑一阵子（3-6个月）","人脉或技能可立刻变现","副业或备选方案","不知道","什么都没有"] },
    { id:4, text:"你上一次真正觉得自己“在做一件事”——不是为了交差，而是因为你想做——是什么时候？", options:["就在最近","几个月前","一年前左右","很久以前，记不清了","从未有过"] },
    { id:5, text:"你身边最亲近的三个人，他们目前的状态跟你比怎么样？", options:["比你好不少","差不多","也困着","不想比较/不清楚"] },
    { id:6, text:"如果有一个机会让你从现在的生活里完全抽身，你最舍不得的是什么？", options:["家人","朋友或社会关系","物质条件（房/收入等）","身份感（职位/社会地位）","没什么舍不得的","我自己——怕离开找不到方向"] },
    { id:7, text:"用一个词或一句话形容你现在的状态。（限20字）", options:[] }
  ];

  // 深度版额外4道开放题
  const questionsDeepExtra = [
    { id:8, text:"你每天醒来，第一个念头是什么？", options:[] },
    { id:9, text:"如果十年后你还是现在的状态，你能接受吗？", options:[] },
    { id:10, text:"你上一次为某件事感到“值得”是什么时候？", options:[] },
    { id:11, text:"你觉得自己目前最大的障碍来自哪里？", options:["外部","内部","不知道"] }
  ];

  let currentQuestions = [...questionsSimple];

  // ===================== 判定逻辑 =====================
  function determineJu(tian, ren, di) {
    // 1. 升局（完美态）：三项均>70，且各项差距不大
    if (tian > 70 && ren > 70 && di > 70) {
      const maxVal = Math.max(tian, ren, di);
      const minVal = Math.min(tian, ren, di);
      if (maxVal - minVal <= 10) return '升局';
      return '升局';
    }
    // 2. 困局：三项都低
    if (tian < 40 && ren < 40 && di < 40) {
      return '困局';
    }
    // 3. 离局：天、地资源尚可，但意义感（人）极低
    if (tian > 60 && di > 60 && ren < 40) return '离局';
    // 4. 滞局：天/地不差但停滞
    if (tian < 50 && di < 40 && ren < 50) return '滞局';
    // 5. 良好态升局：各项都>60
    if (tian > 60 && ren > 60 && di > 60) return '升局';
    // 6. 破土期：兜底
    return '破土期';
  }

  // ===================== 随机附注池 =====================
  const mirrorNotesPool = {
    '困局': [
      '困局不是你的错。但继续困下去，是你的事。',
      '你站在一个错误的位置上——不管怎么选，结果都差不多。',
      '你已经意识到了。这是第一步。下一步是：搞清楚自己是怎么掉进来的。',
      '在最深的地方，你还有一根线。不是力气——是还没彻底放弃的那一口气。',
      '“我的人生，是从什么时候开始，连‘有意义’都算不上了，只算‘还没死’。”',
      '你不会永远困在这里。但你要先承认你困在这里。'
    ],
    '离局': [
      '你什么都有，但不知道自己为什么还要做。这不是你的错——是你的意义感被空转消耗掉了。',
      '困局的人还会挣扎，离局的人连挣扎的理由都找不到。',
      '你不缺资源。你缺一个“为什么”。',
      '你不需要走出去，你需要走回来。回到那个你还知道“为什么”的时候。',
      '最危险的局不是困局，是离局——因为你看起来一点问题都没有。',
      '你不是没能力，你是不知道这能力该往哪用。'
    ],
    '滞局': [
      '有路你也觉得那不是你的路了。先停下来。不是放弃——是攒够力气再走。',
      '你不是没有路，你是觉得那条路不属于你。',
      '最让人累的，不是爬坡，是站在路口等方向。',
      '你需要的不是地图，是一面镜子。先看见自己，再看见路。',
      '停滞也是一种选择。但你选的不是停，是“不选”。',
      '“指南针不能替你走路。”——但你先得有指南针。'
    ],
    '破土期': [
      '你在换方向了。最难的已经过去了。下一步是别停下。',
      '脚下的土在松动，但还没完全破开。你不再问“什么时候才能走出去”——因为你已经在走了。',
      '脚下还有碎玻璃，但你没停下来。',
      '深夜第三次测试，屏幕上的字变了。他盯着那两个字，很久没说话。',
      '破土期不是好日子，也不是坏日子。是“正在动”的日子。',
      '你可能会慢，但你已经不在原地了。'
    ],
    '升局': [
      '你不再问自己“什么时候才能走出去”了。因为你在走了。',
      '升局不是结束。是另一种开始。',
      '三个方向都还不错。不是完美——是你终于有了应对变化的余量。',
      '当你从坑里爬出来，你的手会变得更厚。那不只是老茧——那是你爬过的证据。',
      '升局之后，你会面对新的问题：“然后呢？”——这就是人生。',
      '你不需要镜子了。但你可以把它递给下一个人。'
    ]
  };

  function getMirrorNote(ju) {
    const pool = mirrorNotesPool[ju];
    if (!pool || pool.length === 0) {
      return '没有一步到位的破局。你正在走的每一步，都算数。';
    }
    const randomIndex = Math.floor(Math.random() * pool.length);
    return pool[randomIndex];
  }

  function getInterpretation(juType) {
    const map = {
      '困局':'你的处境是“困局”：天道在坠，人道不明，地道薄弱。这通常意味着你站在一个错误的位置上——不管怎么选，结果都差不多。好消息是：你已经意识到了。坏消息是：意识到和走出来之间，还隔着一片海。你需要先停下来，搞清楚自己是怎么掉进来的。',
      '滞局':'你的处境是“滞局”：有路，但你觉得那不是你的路。你仍然困着——不是因为你不知道方向，是因为你已经累到不再相信“方向有用”。你需要的不是地图，是一面镜子。',
      '离局':'你的处境是“离局”：你什么都有了，但你不确定自己还想不想待在里面。困局的人还会挣扎，离局的人连挣扎的理由都找不到。你需要问自己的不是“我该往哪走”，而是“我为什么在这里”。',
      '破土期':'你的处境是“破土期”：已经在动了。脚下的土在松动，但还没完全破开。你不再问“我什么时候才能走出去”——因为你已经在走了。脚下还有碎玻璃，但你没停下来。',
      '升局':'你的处境是“升局”：三个方向都还不错。不是完美——是你终于有了应对变化的余量。你不再需要一面镜子来告诉你“你在哪”了。你自己知道。接下来，你会面对新的问题——“升局之后，然后呢？”'
    };
    return map[juType] || '';
  }

  function getFictionExcerpt(juType) {
    const excerpts = {
      '困局':'“他说不清自己看到这两个字的时候是什么感觉。不是高兴，不是惊讶。是一种他已经走了三步的感觉。” ——《困局》第二章',
      '滞局':'“阿坤看着大刘，一字一句地说：你不是没有路，你是觉得那条路不属于你。” ——第五章',
      '离局':'“林姐在车库坐了很久。车没熄火，但她哪儿也不想去。” ——第五章',
      '破土期':'“深夜第三次测试，屏幕上的字变了。他盯着那两个字，很久没说话。” ——第四章',
      '升局':'“他终于明白，升局不是结束。是另一种开始。” ——第十五章'
    };
    return excerpts[juType] || '';
  }

  // ===================== 评分逻辑（含深度版词库修正） =====================
  function computeScores(answers) {
    let tian = 50, ren = 50, di = 50;

    // 第1题
    if (answers[0] === "往上走") tian += 25;
    else if (answers[0] === "原地踏步") tian += 5;
    else if (answers[0] === "往下滑") tian -= 30;
    else if (answers[0] === "在换方向") tian += 5;

    // 第2题
    if (answers[1] === "全部或大部分") ren += 30;
    else if (answers[1] === "一半左右") ren += 0;
    else if (answers[1] === "很少") ren -= 15;
    else if (answers[1] === "几乎没有") ren -= 28;
    else if (answers[1] === "我不知道我想做什么") ren -= 20;

    // 第3题
    const val3 = answers[2];
    if (val3 === "充足存款（可支撑1年+）") di += 15;
    else if (val3 === "够撑一阵子（3-6个月）") di += 5;
    else if (val3 === "人脉或技能可立刻变现") di += 22;
    else if (val3 === "副业或备选方案") di += 18;
    else if (val3 === "不知道") di -= 10;
    else if (val3 === "什么都没有") di -= 25;

    // 第4题
    if (answers[3] === "就在最近") ren += 20;
    else if (answers[3] === "几个月前") ren += 10;
    else if (answers[3] === "一年前左右") ren -= 5;
    else if (answers[3] === "很久以前，记不清了") ren -= 15;
    else if (answers[3] === "从未有过") ren -= 25;

    // 第5题
    if (answers[4] === "比你好不少") tian -= 8;
    else if (answers[4] === "差不多") tian += 2;
    else if (answers[4] === "也困着") tian -= 5;
    else if (answers[4] === "不想比较/不清楚") ren -= 5;

    // 第6题
    if (answers[5] === "家人") ren += 8;
    else if (answers[5] === "朋友或社会关系") ren += 5;
    else if (answers[5] === "物质条件（房/收入等）") di += 10;
    else if (answers[5] === "身份感（职位/社会地位）") tian += 5;
    else if (answers[5] === "我自己——怕离开找不到方向") tian += 10;

    // 第7题（自由输入）
    if (answers[6] && typeof answers[6] === 'string') {
      const w = answers[6].trim();
      if (/破|动|走|升|光|新|静/.test(w)) tian += 4;
      if (/累|沉|空|迷/.test(w)) ren -= 4;
    }

    // ===== 深度版词库修正 =====
    if (state.version === 'deep' && answers.length >= 11) {
      const negativeLexicon = ['迷茫','痛苦','无力','焦虑','累','不想','空','耗','熬','困','烦','怕','难','没劲','失望','孤独','压抑','挣扎','麻木','难受'];
      const positiveLexicon = ['期待','坚持','会好','希望','有目标','在动','重启','愿意','做','行动','改变','突破','成长','积累','踏实','平静','接受'];

      for (let i = 7; i <= 10; i++) {
        const answer = answers[i];
        if (typeof answer === 'string' && answer.trim().length > 0) {
          const text = answer;
          negativeLexicon.forEach(word => {
            if (text.includes(word)) {
              const impact = word.length <= 2 ? 5 : 8;
              ren = Math.max(0, ren - impact);
              tian = Math.max(0, tian - (impact * 0.5));
            }
          });
          positiveLexicon.forEach(word => {
            if (text.includes(word)) {
              const impact = word.length <= 2 ? 5 : 8;
              ren = Math.min(100, ren + impact);
              tian = Math.min(100, tian + (impact * 0.5));
            }
          });
        }
      }
    }

    tian = Math.min(100, Math.max(0, tian));
    ren = Math.min(100, Math.max(0, ren));
    di = Math.min(100, Math.max(0, di));
    return { tian, ren, di };
  }

  // ===================== UI 渲染 =====================
  const landingView = document.getElementById('landingView');
  const testView = document.getElementById('testView');
  const resultView = document.getElementById('resultView');
  const questionText = document.getElementById('questionText');
  const optionsContainer = document.getElementById('optionsContainer');
  const openInputContainer = document.getElementById('openInputContainer');
  const openInputField = document.getElementById('openInputField');
  const questionCounter = document.getElementById('questionCounter');
  const progressFill = document.getElementById('progressFill');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  window.selectVersion = (version) => {
    state.version = version;
    document.getElementById('versionSimple').classList.remove('active');
    document.getElementById('versionDeep').classList.remove('active');
    if(version==='simple') document.getElementById('versionSimple').classList.add('active');
    else document.getElementById('versionDeep').classList.add('active');
  };

  window.startTest = () => {
    state.currentStep = 0;
    const total = state.version==='simple' ? 7 : 11;
    state.answers = new Array(total).fill('');
    currentQuestions = state.version==='simple' ? [...questionsSimple] : [...questionsSimple, ...questionsDeepExtra];
    state.totalQuestions = currentQuestions.length;
    landingView.classList.add('hidden');
    resultView.classList.add('hidden');
    testView.classList.remove('hidden');
    renderQuestion();
  };

  function renderQuestion() {
    const q = currentQuestions[state.currentStep];
    questionCounter.textContent = `第 ${state.currentStep+1} / ${state.totalQuestions} 题`;
    progressFill.style.width = ((state.currentStep+1)/state.totalQuestions*100)+'%';
    questionText.textContent = `Q${q.id}. ${q.text}`;

    optionsContainer.innerHTML = '';
    openInputContainer.classList.add('hidden');

    if(q.options && q.options.length>0) {
      q.options.forEach(opt => {
        const optDiv = document.createElement('div');
        optDiv.className = 'option-item';
        if(state.answers[state.currentStep] === opt) optDiv.classList.add('selected');
        optDiv.textContent = opt;
        optDiv.onclick = () => {
          document.querySelectorAll('.option-item').forEach(el=>el.classList.remove('selected'));
          optDiv.classList.add('selected');
          state.answers[state.currentStep] = opt;
        };
        optionsContainer.appendChild(optDiv);
      });
    } else {
      openInputContainer.classList.remove('hidden');
      openInputField.value = state.answers[state.currentStep] || '';
      openInputField.oninput = (e) => {
        state.answers[state.currentStep] = e.target.value;
      };
      // Enter键导航
      openInputField.onkeydown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          nextQuestion();
        }
      };
    }

    prevBtn.style.visibility = state.currentStep===0 ? 'hidden' : 'visible';
    nextBtn.textContent = state.currentStep===state.totalQuestions-1 ? '提交 →' : '下一步 →';
  }

  window.prevQuestion = () => {
    if(state.currentStep>0) {
      if(openInputField && !openInputContainer.classList.contains('hidden')) {
        state.answers[state.currentStep] = openInputField.value;
      }
      state.currentStep--;
      renderQuestion();
    }
  };

  window.nextQuestion = () => {
    if(openInputField && !openInputContainer.classList.contains('hidden')) {
      state.answers[state.currentStep] = openInputField.value;
    }
    if(currentQuestions[state.currentStep].options.length>0 && !state.answers[state.currentStep]) {
      alert('请选择一个选项');
      return;
    }
    if(state.currentStep < state.totalQuestions-1) {
      state.currentStep++;
      renderQuestion();
    } else {
      showResult();
    }
  };

  function computeAxisLabel(tian, ren, di) {
    let tianLabel = '不明', renLabel = '不明', diLabel = '薄弱';
    if(tian < 30) tianLabel = '下坠';
    else if(tian < 55) tianLabel = '平稳';
    else if(tian < 80) tianLabel = '构建中';
    else tianLabel = '上升';

    if(ren < 30) renLabel = '空了';
    else if(ren < 55) renLabel = '不明';
    else if(ren < 80) renLabel = '明晰';
    else renLabel = '深耕中';

    if(di < 30) diLabel = '薄弱';
    else if(di < 55) diLabel = '普通';
    else if(di < 80) diLabel = '扎实';
    else diLabel = '传递中';
    return { tianLabel, renLabel, diLabel };
  }

  function showResult() {
    testView.classList.add('hidden');
    resultView.classList.remove('hidden');

    const scores = computeScores(state.answers);
    const ju = determineJu(scores.tian, scores.ren, scores.di);
    const { tianLabel, renLabel, diLabel } = computeAxisLabel(scores.tian, scores.ren, scores.di);

    document.getElementById('resultTypeName').textContent = ju;
    document.getElementById('interpretationText').textContent = getInterpretation(ju);
    document.getElementById('mirrorNote').textContent = getMirrorNote(ju);
    document.getElementById('fictionExcerpt').innerHTML = `📖 ${getFictionExcerpt(ju)}<br><span style="color:#8B7355; cursor:pointer;">阅读完整章节 →</span>`;

    const dimDiv = document.getElementById('dimensionsDisplay');
    dimDiv.innerHTML = `
      <div class="dimension-row"><span class="dim-label">天道</span><div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${scores.tian}%"></div></div><span>${tianLabel}</span></div>
      <div class="dimension-row"><span class="dim-label">人道</span><div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${scores.ren}%"></div></div><span>${renLabel}</span></div>
      <div class="dimension-row"><span class="dim-label">地道</span><div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${scores.di}%"></div></div><span>${diLabel}</span></div>
    `;
  }

  window.restartTest = () => {
    resultView.classList.add('hidden');
    landingView.classList.remove('hidden');
  };

  window.saveResult = () => {
    alert('结果已保存至本地（模拟）');
  };
  window.shareResult = () => {
    alert('分享功能（模拟）');
  };

  // 默认选中精简版
  selectVersion('simple');
})();
</script>
