<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>困局自测 · 6题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0e8;font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Heiti SC','SimHei',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
.container{max-width:420px;width:100%;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(44,40,34,0.08);padding:32px 24px}

/* 步骤指示 */
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step-dot{width:10px;height:10px;border-radius:50%;background:#e8e0d0;transition:all 0.3s}
.step-dot.active{background:#d4a843;width:28px;border-radius:5px}
.step-dot.done{background:#6a9a6a}

/* 页面 */
.page{display:none}
.page.active{display:block;animation:fadeIn 0.35s}

h1{font-size:22px;font-weight:700;color:#2c2822;letter-spacing:2px;text-align:center}
.sub{font-size:13px;color:#8a7a60;text-align:center;margin:6px 0 24px;letter-spacing:1px}

/* 进度 */
.progress-bar{height:4px;background:#e8e0d0;border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:#d4a843;border-radius:2px;transition:width 0.4s ease;width:0%}

/* 题目 */
.q-title{font-size:17px;font-weight:600;color:#2c2822;letter-spacing:1px;margin-bottom:18px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:block;padding:14px 18px;border:2px solid #e8e0d0;border-radius:8px;cursor:pointer;font-size:15px;color:#5a4a3a;transition:all 0.2s;text-align:center}
.option:hover{border-color:#d4a843;background:rgba(212,168,67,0.04)}
.option.selected{border-color:#d4a843;background:rgba(212,168,67,0.1);color:#2c2822;font-weight:600}

/* 导航按钮 */
.nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.nav button{flex:1;padding:12px;border:none;border-radius:6px;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-prev{background:#e8e0d0;color:#8a7a60}
.btn-prev:hover{background:#ddd5c5}
.btn-next,#submitBtn{background:#d4a843;color:#fff}
.btn-next:hover,#submitBtn:hover{background:#e4b853}
.btn-next:disabled{background:#e8e0d0;color:#b8a888;cursor:not-allowed}
#submitBtn{width:100%;padding:14px;font-size:16px;margin-top:8px}
#submitBtn:disabled{background:#e8e0d0;color:#b8a888;cursor:not-allowed}

/* 结果页 */
.result-icon{font-size:48px;text-align:center;margin-bottom:8px}
.result-title{font-size:16px;font-weight:600;text-align:center;color:#8a7a60;letter-spacing:1px}
.result-gua{font-size:24px;font-weight:900;text-align:center;letter-spacing:4px;margin:6px 0}
.result-desc{font-size:14px;color:#5a4a3a;line-height:1.8;text-align:center;margin:6px 0 16px;padding:12px;background:#faf5ea;border-radius:6px}
.result-card{padding:12px;border-radius:8px;margin-bottom:8px;text-align:center}
.answer-label{font-size:11px;color:#b8a888;letter-spacing:1px;margin-bottom:4px}
.answer-strip{font-size:24px;font-weight:700;letter-spacing:8px;margin:4px 0 12px}
.one-liner{font-size:13px;line-height:1.6;color:#5a4a3a;margin:6px 0;padding:8px;background:#faf5ea;border-radius:4px;letter-spacing:0.5px}
.action{font-size:12px;color:#8b1a1a;letter-spacing:1px;margin-top:4px}

/* 提交表单 */
.form-section{margin-top:20px;padding-top:16px;border-top:1px solid #e8e0d0}
.form-section label{font-size:13px;color:#5a4a3a;letter-spacing:1px;display:block;margin-bottom:6px}
.form-section input{width:100%;padding:12px 14px;border:2px solid #e8e0d0;border-radius:6px;font-size:14px;font-family:inherit;color:#2c2822;outline:none;transition:border 0.2s}
.form-section input:focus{border-color:#d4a843}
.form-section .hint{font-size:11px;color:#b8a888;margin-top:4px;letter-spacing:0.5px}

/* 提交成功 */
.success-icon{font-size:56px;text-align:center;margin-bottom:8px}
.success-text{font-size:16px;font-weight:600;text-align:center;color:#2c2822;letter-spacing:1px}
.success-desc{font-size:13px;color:#8a7a60;text-align:center;margin:6px 0 16px;line-height:1.6;letter-spacing:0.5px}

/* 进度条步骤文字 */
.step-label{text-align:center;font-size:11px;color:#b8a888;letter-spacing:1px;margin-bottom:4px}

.tag{text-align:center;margin-top:16px;font-size:10px;color:#b8a888;letter-spacing:1px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">

  <h1>困局自测</h1>
  <div class="sub">6道题，凭直觉选是或不是</div>

  <!-- 步骤指示 -->
  <div class="steps" id="steps">
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>
  <div class="step-label" id="stepLabel">第 1 步：答题</div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- ===== 页面1：答题 ===== -->
  <div class="page active" id="pageQuiz">
    <div class="quiz-area" id="quizArea"></div>
    <div class="nav">
      <button class="btn-prev" id="prevBtn" onclick="prevQ()" style="display:none">← 上一题</button>
      <button class="btn-next" id="nextBtn" onclick="nextQ()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- ===== 页面2：结果 ===== -->
  <div class="page" id="pageResult">
    <div class="result-icon">🔮</div>
    <div class="result-title">你的困局类型</div>
    <div class="result-gua" id="resultGua"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-card">
      <div class="answer-label">你的回答</div>
      <div class="answer-strip" id="answerStrip"></div>
      <div class="one-liner" id="resultOneLiner"></div>
      <div class="action" id="resultAction"></div>
    </div>
    <div class="form-section">
      <label>留下联系方式，获取专属诊断报告</label>
      <input type="text" id="contactInput" placeholder="你的微信ID 或 手机号" autocomplete="off">
      <div class="hint">提交后懒哲人会联系你，发送完整报告</div>
      <button class="btn-next" id="submitBtn" onclick="submitResult()" disabled style="width:100%;margin-top:12px">提交并获取完整报告 →</button>
    </div>
    <div class="tag">懒哲人 · 三分法 · 困局诊断</div>
  </div>

  <!-- ===== 页面3：提交成功 ===== -->
  <div class="page" id="pageSuccess">
    <div class="success-icon">✅</div>
    <div class="success-text">提交成功！</div>
    <div class="success-desc">
      你的诊断结果已记录。<br><br>
      <strong style="color:#2c2822">请把以下信息发给懒哲人：</strong><br>
      你的回答序列 + 联系方式<br>
      （已自动复制到剪贴板）<br><br>
      懒哲人会为你发送完整诊断报告。<br><br>
      你也可以直接关注：<br>
      📕 小红书「观察懒人」<br>
      💬 知乎专栏「懒哲人」
    </div>
    <div class="tag">在此之前，你可以截图这个结果发朋友圈</div>
  </div>

</div>

<script>
// ===== 题库 =====
const questions = [
  { id: 1, dim: "tian", text: "1. 你做的事，大方向是对的吗？" },
  { id: 2, dim: "tian", text: "2. 外面的变化，你感觉自己跟得上？" },
  { id: 3, dim: "di", text: "3. 你手头的资源，够你撑半年吗？" },
  { id: 4, dim: "di", text: "4. 你现在的条件，能让你放手一搏吗？" },
  { id: 5, dim: "ren", text: "5. 你心里清楚下一步该做什么？" },
  { id: 6, dim: "ren", text: "6. 你每天都在朝那个方向动？" }
];

const results = {
  "+++": { gua: "乾为天 · 亢龙有悔", desc: "你什么都有，就是有点飘。方向对、条件够、行动力也强——但你可能忘了自己也是凡人。", oneLiner: "你不是没有，是拥有太多反而不知道珍惜什么。", action: "该落地了。选一件事，做到极致。" },
  "++-": { gua: "泽水困 · 空转困局", desc: "条件挺好，但你在原地打转。有方向有资源，就是不动——再好的牌不打也会烂。", oneLiner: "你缺的不是能力，是迈出第一步的勇气。", action: "动起来就行。今天就做一件你拖了很久的事。" },
  "+-+": { gua: "水雷屯 · 创始艰难", desc: "方向对，也肯干，但底子太薄。你现在是万事开头难的阶段，熬过去就是另一片天。", oneLiner: "不是你不配，是你还在攒够资格的途中。", action: "先攒资源。别急着冲，磨刀不误砍柴工。" },
  "+--": { gua: "山水蒙 · 启蒙迷茫", desc: "有利可图，但你不知道从哪下手。你缺的不是机会，缺的是带路的人。", oneLiner: "你不笨，只是还没人告诉你路在哪。", action: "找人带路。找一个已经走过这条路的人。" },
  "-++": { gua: "水天需 · 待时之困", desc: "你有资源有能力，但大势还没到。你现在能做的不是硬冲，是等风来。", oneLiner: "不是你没用，是时机没到。", action: "等风来。准备好自己，风来的时候你第一个飞。" },
  "-+-": { gua: "天地否 · 被困之局", desc: "环境很差，你也不差条件，但你就是不动。你在等什么？等别人来救你？", oneLiner: "困住你的不是环境，是你自己。", action: "先迈一小步。哪怕只是打个电话、发条消息。" },
  "--+": { gua: "坎为水 · 硬扛之局", desc: "啥都没有，但你在硬撑。环境不好、资源不够、方向也模糊——但你还没倒。", oneLiner: "你已经比90%的人能扛了，但扛不是唯一的路。", action: "找人，别硬扛。一个人扛不动的时候就喊一声。" },
  "---": { gua: "艮为山 · 卡住之局", desc: "上不去也下不来。你卡在中间，动不了、退不了、也停不下来。", oneLiner: "你太想动了，所以动不了。", action: "先停下来。不动不是认输，是等路出现。" }
};

const colors = {
  '+++':'#8b1a1a','++-':'#c87a2a','+-+':'#4a6fa5','+--':'#6a8a6a',
  '-++':'#c49a4a','-+-':'#6a6a6a','--+':'#5a3a5a','---':'#3a3a5a'
};

let answers = {};
let currentQ = 0;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // 更新步骤指示
  const dots = document.querySelectorAll('.step-dot');
  if (id === 'pageQuiz') { dots[0].className='step-dot active'; dots[1].className='step-dot'; dots[2].className='step-dot'; dots[3].className='step-dot'; document.getElementById('stepLabel').textContent='第 1 步：答题'; }
  else if (id === 'pageResult') { dots[0].className='step-dot done'; dots[1].className='step-dot active'; dots[2].className='step-dot'; dots[3].className='step-dot'; document.getElementById('stepLabel').textContent='第 2 步：查看结果'; }
  else if (id === 'pageSuccess') { dots[0].className='step-dot done'; dots[1].className='step-dot done'; dots[2].className='step-dot done'; dots[3].className='step-dot done'; document.getElementById('stepLabel').textContent='完成！'; }
}

// ===== 渲染题目 =====
function renderQ(index) {
  if (index >= questions.length) { goToResult(); return; }
  const q = questions[index];
  const selected = answers[q.id] || '';
  document.getElementById('quizArea').innerHTML = `
    <div class="q-title">${q.text}</div>
    <div class="options">
      <div class="option ${selected==='是'?'selected':''}" onclick="select(${q.id},'是')">✅ 是</div>
      <div class="option ${selected==='不是'?'selected':''}" onclick="select(${q.id},'不是')">❌ 不是</div>
    </div>
  `;
  document.getElementById('progressFill').style.width = ((index)/questions.length*100)+'%';
  document.getElementById('prevBtn').style.display = index===0?'none':'block';
  updateNextBtn();
}

function select(qId, val) {
  answers[qId] = val;
  document.querySelectorAll('.option').forEach(el => {
    const txt = el.textContent.trim().replace(/[✅❌]/g,'').trim();
    el.classList.toggle('selected', txt === val);
  });
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('nextBtn');
  if (answers[questions[currentQ].id]) {
    btn.disabled = false;
    btn.textContent = currentQ===questions.length-1 ? '查看结果 →' : '下一题 →';
  } else { btn.disabled = true; }
}

function nextQ() {
  if (!answers[questions[currentQ].id]) return;
  currentQ++;
  renderQ(currentQ);
}

function prevQ() { if (currentQ>0) { currentQ--; renderQ(currentQ); } }

// ===== 结果页 =====
function goToResult() {
  showPage('pageResult');
  document.getElementById('progressFill').style.width = '100%';
  computeResult();
}

function computeResult() {
  let tian=0, di=0, ren=0;
  questions.forEach(q => {
    const s = answers[q.id]==='是'?1:-1;
    if (q.dim==='tian') tian+=s; else if (q.dim==='di') di+=s; else ren+=s;
  });
  const key = (tian>0?'+':'-') + (di>0?'+':'-') + (ren>0?'+':'-');
  const res = results[key] || results['---'];
  const c = colors[key] || '#8b1a1a';

  document.getElementById('resultGua').textContent = res.gua;
  document.getElementById('resultGua').style.color = c;
  document.getElementById('resultDesc').textContent = res.desc;
  document.getElementById('resultOneLiner').textContent = '「' + res.oneLiner + '」';
  document.getElementById('resultAction').textContent = '→ ' + res.action;

  const seq = questions.map(q => answers[q.id]==='是'?'是':'否').join('');
  document.getElementById('answerStrip').innerHTML = seq.split('').map(a =>
    a==='是'?'<span style="color:#6a9a6a">是</span>':'<span style="color:#c0392b">否</span>'
  ).join('');

  // 监听联系方式输入
  document.getElementById('contactInput').addEventListener('input', function() {
    document.getElementById('submitBtn').disabled = !this.value.trim();
  });
}

// ===== 提交 =====
function submitResult() {
  const contact = document.getElementById('contactInput').value.trim();
  if (!contact) return;
  
  let tian=0, di=0, ren=0;
  questions.forEach(q => {
    const s = answers[q.id]==='是'?1:-1;
    if (q.dim==='tian') tian+=s; else if (q.dim==='di') di+=s; else ren+=s;
  });
  const key = (tian>0?'+':'-') + (di>0?'+':'-') + (ren>0?'+':'-');
  const res = results[key] || results['---'];

  // 构建结果文本（复制到剪贴板）
  const answers_str = questions.map(q => answers[q.id]==='是'?'是':'否').join('');
  const result_txt = `【困局自测 · 提交结果】
━━━━━━━━━━━━━━━━━━
回答序列：${answers_str}
诊断结果：${res.gua}
━━━━━━━━━━━━━━━━━━
联系方式：${contact}
请将以上内容发给懒哲人，领取完整诊断报告。`;

  // 复制到剪贴板（静默，不弹窗）
  navigator.clipboard.writeText(result_txt).catch(() => {});

  showPage('pageSuccess');
}

// ===== 启动 =====
renderQ(0);
</script>
</body>
</html>
